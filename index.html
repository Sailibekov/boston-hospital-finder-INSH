<!DOCTYPE html>
<html>
<head>
  <title>Boston Hospital Finder</title>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }

    #header {
      background: #003087; color: white;
      padding: 16px 24px;
    }
    #header h1 { font-size: 22px; }
    #header p  { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    #controls {
      background: white; padding: 14px 24px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid #ddd;
    }
    input, select, button {
      padding: 8px 12px; font-size: 15px;
      border: 1px solid #ccc; border-radius: 4px;
    }
    button { background: #003087; color: white; border: none; cursor: pointer; }
    button:hover { background: #00205b; }

    #main { display: flex; height: calc(100vh - 110px); }

    #map {
      flex: 1;
      height: 100%;
    }

    /* TODO: Ticket 1 — add #map style here */

    #sidebar {
      width: 320px; /* TODO: Ticket 1 — change to 320px once map is added */
      background: white;
      border-left: 1px solid #ddd;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 12px 16px; background: #f9f9f9;
      border-bottom: 1px solid #ddd; font-size: 13px; color: #555;
    }
    #results { overflow-y: auto; flex: 1; padding: 10px; }
    #loading {
      display: none; padding: 20px;
      text-align: center; color: #555; font-size: 14px;
    }

    .hospital-card {
      border: 1px solid #ddd; border-radius: 6px;
      padding: 10px 12px; margin-bottom: 8px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .hospital-card:hover { border-color: #003087; }
    .hospital-card.active { border-color: #003087; background: #f0f4ff; }
    .hospital-name { font-weight: bold; font-size: 14px; }
    .hospital-meta { font-size: 12px; color: #666; margin-top: 3px; }
    .dist-badge {
      display: inline-block; background: #003087; color: white;
      border-radius: 10px; padding: 1px 8px; font-size: 11px; margin-left: 6px;
    }

    /* TODO: Ticket 2 — add popup styles here if needed */
    .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 6px; }
    .popup-addr  { font-size: 12px; color: #555; margin-bottom: 8px; }
    .vuln-table  { width: 100%; border-collapse: collapse; font-size: 12px; }
    .vuln-table th { text-align: left; color: #888; font-weight: normal; padding: 2px 4px; }
    .vuln-table td { text-align: right; font-weight: bold; padding: 2px 4px; }
    .vuln-bar-wrap { background: #eee; border-radius: 4px; height: 6px; width: 80px; display:inline-block; vertical-align:middle; margin-left: 6px; }
    .vuln-bar     { background: #003087; border-radius: 4px; height: 6px; }
    .no-vuln      { font-size: 12px; color: #999; font-style: italic; }
  </style>
</head>
<body>

<div id="header">
  <h1>🏥 Boston Hospital Finder</h1>
  <p>Find nearby hospitals and explore neighborhood vulnerability across Boston</p>
</div>

<div id="controls">
  <input type="text" id="zip" placeholder="Enter ZIP code (e.g. 02115)" maxlength="5" style="width:220px">
  <select id="radius">
    <option value="1">Within 1 mile</option>
    <option value="5" selected>Within 5 miles</option>
    <option value="10">Within 10 miles</option>
    <option value="25">Within 25 miles</option>
  </select>
  <button onclick="findHospitals()">Search</button>
</div>

<div id="main">

  <div id="map"></div>

  <!-- TODO: Ticket 1 — add <div id="map"></div> here -->

  <div id="sidebar">
    <div id="sidebar-header">Enter a ZIP code to find nearby hospitals</div>
    <div id="loading">⏳ Loading data...</div>
    <div id="results"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- TODO: Ticket 1 — add Leaflet JS script tag here -->

<script>
// ── Data URLs ──
const HOSPITAL_CSV = "https://data.boston.gov/dataset/d9871e89-2d1e-4ecf-b0de-046f553027c0/resource/6222085d-ee88-45c6-ae40-0c7464620d64/download/hospital-locations.csv";
const VULN_CSV     = "https://bostonopendata-boston.opendata.arcgis.com/api/download/v1/items/34f2c48b670d4b43a617b1540f20efe3/csv?layers=0";

// ── State ──
// TODO: Ticket 1 — add map and markersLayer variables here
let map, markersLayer;
let vulnByNeigh = {}; // stores vulnerability scores keyed by neighborhood name

// ── TODO: Ticket 1 — add initMap() function here ──
function initMap() {
  map = L.map("map").setView([42.3601, -71.0589], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors"
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

// ── Robust CSV parser (handles quoted fields with embedded commas and newlines) ──
function parseCSV(text) {
  const results = [];
  let i = 0, headers = null;
  function parseField() {
    if (text[i] === '"') {
      i++;
      let val = "";
      while (i < text.length) {
        if (text[i] === '"' && text[i+1] === '"') { val += '"'; i += 2; }
        else if (text[i] === '"') { i++; break; }
        else val += text[i++];
      }
      return val.trim();
    }
    let val = "";
    while (i < text.length && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r')
      val += text[i++];
    return val.trim();
  }
  function parseLine() {
    const fields = [];
    while (i < text.length && text[i] !== '\n' && text[i] !== '\r') {
      fields.push(parseField());
      if (text[i] === ',') i++;
    }
    if (text[i] === '\r') i++;
    if (text[i] === '\n') i++;
    return fields;
  }
  headers = parseLine().map(h => h.toUpperCase());
  while (i < text.length) {
    if (text[i] === '\r' || text[i] === '\n') { i++; continue; }
    const vals = parseLine();
    if (!vals.length || (vals.length === 1 && !vals[0])) continue;
    const obj = {};
    headers.forEach((h, idx) => obj[h] = vals[idx] || "");
    results.push(obj);
  }
  return results;
}

// ── Euclidean distance in miles ──
// 1 degree latitude ≈ 69 miles, 1 degree longitude ≈ 52 miles in Boston
// Simple and accurate enough for short local distances
function distMiles(lat1, lon1, lat2, lon2) {
  const dLat = (lat2 - lat1) * 69;
  const dLon = (lon2 - lon1) * 52;
  return Math.sqrt(dLat * dLat + dLon * dLon);
}

// ── ZIP → lat/lon using free Zippopotam API ──
async function getZipCoords(zip) {
  const res = await fetch(`https://api.zippopotam.us/us/${zip}`);
  if (!res.ok) return null;
  const d = await res.json();
  return {
    lat: parseFloat(d.places[0].latitude),
    lon: parseFloat(d.places[0].longitude),
    city: d.places[0]["place name"],
    state: d.places[0]["state"]
  };
}

// ── TODO: Ticket 1 — add makeMarker(lat, lon) function here ──
function makeMarker(lat, lon) {
  return L.circleMarker([lat, lon], {
    radius: 10,
    fillColor: "#003087",
    color: "#ffffff",
    weight: 2,
    fillOpacity: 0.85
  });
}

// ── Neighborhood name normalization for hospital → vulnerability join ──
// Hospital NEIGH is uppercase and sometimes uses slashes for combined neighborhoods.
// Vulnerability dataset uses title case single names. This map handles the mismatches.
const NEIGH_MAP = {
  "FENWAY/KENMORE":   "Fenway",
  "ALLSTON/BRIGHTON": "Allston",
  "CENTRAL":          null  // no matching neighborhood in vulnerability dataset
};
function normalizeNeigh(neigh) {
  if (!neigh) return null;
  const upper = neigh.toUpperCase().trim();
  if (upper in NEIGH_MAP) return NEIGH_MAP[upper];
  // Title-case the name and return as-is for direct matches
  return neigh.trim().replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

// ── TODO: Ticket 2 — add loadVulnerability() function here ──
async function loadVulnerability() {
  const text = await fetch(VULN_CSV).then(r => r.text());
  const rows = parseCSV(text);

  // Accumulate totals per neighborhood across census tract rows
  const totals = {};
  for (const row of rows) {
    const name = (row["NAME"] || "").trim();
    if (!name) continue;
    if (!totals[name]) totals[name] = { pop: 0, older: 0, child: 0, lowinc: 0, dis: 0, lep: 0 };
    totals[name].pop    += parseFloat(row["POP100_RE"]  || 0);
    totals[name].older  += parseFloat(row["OLDERADULT"] || 0);
    totals[name].child  += parseFloat(row["TOTCHILD"]   || 0);
    totals[name].lowinc += parseFloat(row["LOW_TO_NO"]  || 0);
    totals[name].dis    += parseFloat(row["TOTDIS"]     || 0);
    totals[name].lep    += parseFloat(row["LEP"]        || 0);
  }

  // Convert totals to percentages and key by uppercase name for easy lookup
  for (const [name, t] of Object.entries(totals)) {
    if (!t.pop) continue;
    const pct = v => +((v / t.pop) * 100).toFixed(1);
    vulnByNeigh[name.toUpperCase()] = {
      olderPct:  pct(t.older),
      childPct:  pct(t.child),
      lowincPct: pct(t.lowinc),
      disPct:    pct(t.dis),
      lepPct:    pct(t.lep)
    };
  }
}

// ── TODO: Ticket 2 — add makePopupHTML(hospital, vuln) function here ──
function makePopupHTML(hospital, vuln) {
  const name = hospital.NAME || "";
  const addr = hospital.AD   || "";
  const neigh = hospital.NEIGH || "";

  if (!vuln) {
    return `
      <div class="popup-title">${name}</div>
      <div class="popup-addr">📍 ${addr} &nbsp;·&nbsp; ${neigh}</div>
      <div class="no-vuln">No vulnerability data for this neighborhood.</div>
    `;
  }

  function row(label, pct) {
    const bar = Math.min(pct, 100);
    return `
      <tr>
        <th>${label}</th>
        <td>${pct}%
          <span class="vuln-bar-wrap"><span class="vuln-bar" style="width:${bar}%"></span></span>
        </td>
      </tr>`;
  }

  return `
    <div class="popup-title">${name}</div>
    <div class="popup-addr">📍 ${addr} &nbsp;·&nbsp; ${neigh}</div>
    <table class="vuln-table">
      <thead><tr><th colspan="2" style="padding-bottom:4px;color:#003087;font-weight:bold">Neighborhood Vulnerability</th></tr></thead>
      <tbody>
        ${row("Elderly (65+)",       vuln.olderPct)}
        ${row("Children (under 5)", vuln.childPct)}
        ${row("Low / No Income",    vuln.lowincPct)}
        ${row("Disabilities",       vuln.disPct)}
        ${row("Limited English",    vuln.lepPct)}
      </tbody>
    </table>
  `;
}

// ── Render sidebar cards ──
function renderSidebar(matches, markers) {
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";
  matches.forEach((h, idx) => {
    const card = document.createElement("div");
    card.className = "hospital-card";
    card.innerHTML = `
      <div class="hospital-name">
        ${h.NAME}
        <span class="dist-badge">${h.dist.toFixed(1)} mi</span>
      </div>
      <div class="hospital-meta">📍 ${h.AD || ""} &nbsp;|&nbsp; 🏙 ${h.NEIGH || ""}</div>
    `;
    card.onclick = () => {
      document.querySelectorAll(".hospital-card").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
      // TODO: Ticket 1 — pan map and open popup: markers[idx].openPopup(); map.panTo(...)
      markers[idx].openPopup();
      map.panTo([matches[idx].lat, matches[idx].lon]);
    };
    resultsDiv.appendChild(card);
  });
}

// ── Main search function ──
async function findHospitals() {
  const zipInput   = document.getElementById("zip").value.trim();
  const radius     = parseFloat(document.getElementById("radius").value);
  const resultsDiv = document.getElementById("results");
  const loading    = document.getElementById("loading");
  const sidebarHdr = document.getElementById("sidebar-header");

  if (!zipInput || zipInput.length < 5) {
    resultsDiv.innerHTML = "<p style='padding:16px;color:#666'>Please enter a valid 5-digit ZIP code.</p>";
    return;
  }

  loading.style.display = "block";
  resultsDiv.innerHTML  = "";
  // TODO: Ticket 1 — clear existing markers: markersLayer.clearLayers()
  markersLayer.clearLayers();

  // Step 1: convert ZIP to coordinates
  const coords = await getZipCoords(zipInput);
  if (!coords) {
    loading.style.display = "none";
    resultsDiv.innerHTML = "<p style='padding:16px;color:red'>ZIP code not found.</p>";
    return;
  }

  // Step 2: fetch hospital CSV + vulnerability data in parallel
  // TODO: Ticket 2 — also load vulnerability data here using Promise.all
  const [hospText] = await Promise.all([
    fetch(HOSPITAL_CSV).then(r => r.text()),
    Object.keys(vulnByNeigh).length === 0 ? loadVulnerability() : Promise.resolve()
  ]);
  const hospitals = parseCSV(hospText);

  // Step 3: extract coordinates from Location field and filter by radius
  // Location field format: "(42.336, -71.107)"
  const coordRx = /\(\s*([-\d.]+),\s*([-\d.]+)\s*\)/;
  const matches = hospitals.map(h => {
    const m = (h["LOCATION"] || "").match(coordRx);
    if (!m) return null;
    const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
    if (!lat || !lon) return null;
    return { ...h, lat, lon, dist: distMiles(coords.lat, coords.lon, lat, lon) };
  }).filter(h => h && h.dist <= radius).sort((a, b) => a.dist - b.dist);

  loading.style.display = "none";

  if (!matches.length) {
    sidebarHdr.textContent = `No hospitals within ${radius} miles of ${zipInput}`;
    resultsDiv.innerHTML = "<p style='padding:16px;color:#666'>Try increasing the search radius.</p>";
    return;
  }

  sidebarHdr.textContent = `${matches.length} hospital${matches.length > 1 ? "s" : ""} within ${radius} miles of ${coords.city}, ${coords.state}`;

  // Step 4: add markers to map
  const markers = matches.map(h => {
    // TODO: Ticket 1 — loop matches, call makeMarker() and add each to markersLayer
    const marker = makeMarker(h.lat, h.lon);

    // TODO: Ticket 2 — bind popup to each marker
    const neighKey = normalizeNeigh(h.NEIGH);
    const vuln = neighKey ? vulnByNeigh[neighKey.toUpperCase()] || null : null;
    marker.bindPopup(makePopupHTML(h, vuln), { maxWidth: 260 });

    marker.addTo(markersLayer);
    return marker;
  });

  // TODO: Ticket 1 — fit map to markers
  if (markers.length) {
    map.fitBounds(L.featureGroup(markers).getBounds().pad(0.2));
  }

  // Step 5: render sidebar
  renderSidebar(matches, markers);
}

// ── Enter key support ──
document.getElementById("zip").addEventListener("keydown", e => {
  if (e.key === "Enter") findHospitals();
});

// ── Boot ──
// TODO: Ticket 1 — call initMap() here
initMap();
</script>
</body>
</html>
